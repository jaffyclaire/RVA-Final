<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pabili Finder - Account</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="dashboard-wrapper">
    
    <header class="top-navbar">
      <div class="brand-group">
        <svg viewBox="0 0 100 100" class="nav-logo">
          <path d="M50 12 L88 31 L50 50 L12 31 Z" fill="#0084ff" />
          <path d="M50 50 L88 31 L88 71 L50 90 Z" fill="#ffb700" />
          <path d="M50 50 L12 31 L12 71 L50 90 Z" fill="#ff0066" />
          <path d="M50 31 L74 41 L50 52 L26 41 Z" fill="#004ea3" opacity="0.25" />
        </svg>
        <span class="nav-title">Pabili Finder</span>
      </div>
    </header>

    <div class="main-body">
      
      <aside class="sidebar">
        <nav class="sidebar-menu">
          <a href="#" class="menu-item">Dashboard</a>
          <a href="#" class="menu-item">Stores</a>
          <a href="#" class="menu-item">Settings</a>
          <a href="#" class="menu-item active">Account</a>
        </nav>
      </aside>

      <main class="account-viewport">
        <div class="profile-panel-card">
          
          <div class="avatar-container">
            <div class="profile-avatar-blank"></div>
            <button class="avatar-edit-badge" aria-label="Edit profile picture">
              <svg viewBox="0 0 24 24" class="edit-icon">
                <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>
              </svg>
            </button>
          </div>

          <div class="profile-identity-capsule" id="nameCapsule">
            <span class="user-display-name" id="userNameText">Jafna Claire P. Malabat</span>
            <button class="name-edit-trigger" id="editNameBtn" aria-label="Edit user name">
              <svg viewBox="0 0 24 24" class="inline-edit-icon">
                <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>
              </svg>
            </button>
          </div>

        </div>
      </main>

    </div>
  </div>

</body>
</html>
